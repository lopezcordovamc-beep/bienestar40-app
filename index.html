            getNext: (key, length) => {
                let q = ContentEngine.getQueues();
                let current = q[key];
                
                if (!current || current.length === 0) {
                    current = Array.from({length}, (_, i) => i);
                    for (let i = current.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [current[i], current[j]] = [current[j], current[i]];
                    }
                }
                
                const index = current.shift(); 
                q[key] = current;
                ContentEngine.saveQueues(q);
                return index;
            },
            resetAll: () => {
                localStorage.removeItem('b40_content_queues');
            }

        // ==========================================
        // MOTOR PRINCIPAL
        // ==========================================
        function App() {
            const [view, setView] = useState('loading');
            const [userName, setUserName] = useState('');
            const [victories, setVictories] = useState(0);
            
            const [selectedEmotion, setSelectedEmotion] = useState(null);
            const [activeRefuge, setActiveRefuge] = useState(null);
            
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [showProfile, setShowProfile] = useState(false);

            useEffect(() => {
                const savedName = localStorage.getItem('bienestar40_name');
                const savedVictories = localStorage.getItem('bienestar40_victories');
                
                if (savedVictories) setVictories(parseInt(savedVictories));
                
                setTimeout(() => {
                    if (savedName) { setUserName(savedName); setView('home'); } 
                    else { setView('onboarding'); }
                }, 800); 
            }, []);

            const navigateTo = (newView) => {
                setIsTransitioning(true);
                setTimeout(() => { setView(newView); setIsTransitioning(false); }, 500); 
            };

            const handleSelectEmotion = (emotionId) => {
                const emotion = EMOTION_CATEGORIES[emotionId];
                const collection = REFUGE_LIBRARY[emotionId];
                
                const idx = ContentEngine.getNext(`refuge_${emotionId}`, collection.length);
                const chosenRefuge = collection[idx];
                
                setSelectedEmotion(emotion);
                setActiveRefuge(chosenRefuge);
                navigateTo('validation');
            };

            const handleSaveVictory = () => {
                if (!activeRefuge || !selectedEmotion) return;
                
                const newTotal = victories + 1;
                setVictories(newTotal);
                localStorage.setItem('bienestar40_victories', newTotal.toString());

                navigateTo('victory');
            };

            const updateName = (newName) => {
                if(newName.trim()) {
                    localStorage.setItem('bienestar40_name', newName.trim());
                    setUserName(newName.trim());
                    setShowProfile(false);
                }
            };

            const resetProgress = () => {
                localStorage.removeItem('bienestar40_victories');
                ContentEngine.resetAll(); 
                setVictories(0);
                setShowProfile(false);
            };

            return (
                <Card className={isTransitioning ? 'opacity-0 transition-opacity duration-500' : 'opacity-100 transition-opacity duration-500'}>
                    {showProfile && <ProfileModal currentName={userName} onClose={() => setShowProfile(false)} onSave={updateName} onReset={resetProgress} />}
                    
                    {view === 'loading' && (
                        <div className="flex-1 flex flex-col items-center justify-center text-slate-400 animate-pulse-slow">
                            <Sparkles size={24} className="mb-2 opacity-50" />
                            <span className="font-serif italic text-sm tracking-widest">Creando espacio...</span>
                        </div>
                    )}
                    {view === 'onboarding' && <OnboardingView onComplete={(name) => { updateName(name); navigateTo('home'); }} />}
                    {view === 'home' && <HomeView userName={userName} victories={victories} onSelectEmotion={handleSelectEmotion} onOpenProfile={() => setShowProfile(true)} />}
                    {view === 'validation' && <ValidationView emotion={selectedEmotion} activeRefuge={activeRefuge} onBack={() => navigateTo('home')} onContinue={() => navigateTo('preparation')} />}
                    {view === 'preparation' && <PreparationView onReady={() => navigateTo('refuge')} />}
                    {view === 'refuge' && <RefugeView activeRefuge={activeRefuge} onComplete={() => navigateTo('closure')} />}
                    {view === 'closure' && <ClosureView onContinue={() => navigateTo('gift')} />}
                    {view === 'gift' && <GiftView onContinue={handleSaveVictory} totalVictories={victories} />}
                    {view === 'victory' && <VictoryView onHome={() => navigateTo('home')} />}
                </Card>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
